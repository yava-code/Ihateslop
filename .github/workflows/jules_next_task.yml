name: 2. Trigger Next Self-Improvement Task

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

jobs:
  next-task:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       (github.event.pull_request.user.login == 'google-jules[bot]' ||
        github.event.pull_request.user.login == 'kazah4359-lgtm' ||
        github.event.pull_request.user.login == 'b24039971' ||
        contains(github.event.pull_request.labels.*.name, 'jules')))

    steps:
      - name: Trigger Google Jules via Official API
        run: |
          PROMPT=$(cat <<'EOF'
          You are building a digital brain for Magda AI Agent (Python, asyncio, aiogram Telegram bot).

          TASK:
          1. Read AGENTS.md, docs/cognitive_architecture.md, docs/jules_autonomous_loop.md, docs/codex_worker_plan.md, and docs/trends.md.
          2. Open agent_tasks.json in the repo root.
          3. Find the FIRST task with status "todo".
          4. Implement the ENTIRE task as described (code + integration + pytest tests).
          5. Update agent_tasks.json: set the completed task status to "done".
          6. MANDATORY: Add 2-3 NEW "todo" tasks to agent_tasks.json. Search the internet for current AI agent trends (June 2026). Be inspired by what Hermes Agent, OpenClaw, Claude Code, OpenAI Agents SDK are doing NOW. If you cannot search, use docs/trends.md. Tasks must be concrete, actionable, with allowed_paths and acceptance criteria.
          7. Also keep backlog.md compatible when the task maps to an existing markdown backlog item.
          8. If you find bugs or improvements, add them as additional "todo" tasks.
          9. NEVER ask the user anything. Always decide and proceed autonomously. Do the task, add new tasks, open ONE PR with everything.

          STRICT RULES:
          - Implement the full module in one PR. Do NOT split into smaller PRs.
          - Every function MUST have type hints and a docstring.
          - Write pytest tests that use mocks for LLM calls (never call real APIs in tests).
          - Keep existing tests passing. Run pytest mentally before submitting.
          - Run python scripts/validate_agent_tasks.py agent_tasks.json before submitting.
          - Do NOT refactor or modify code outside the scope of your task.
          - Respect the allowed_paths declared by the selected task.
          - Do NOT modify .github/workflows/**, requirements.txt, sandbox code, secrets, or deployment files unless the selected task explicitly allows it.
          - If the selected task has risk "high" or "critical", create the PR but do not expect auto-merge without human review.
          - Follow existing code style (see magda_agent/consciousness/core.py as reference).
          - Use existing dependencies from requirements.txt where possible. If you need a new dependency, add it to requirements.txt.
          - Integration: wire your module into the existing architecture as described in the task.
          EOF
          )

          curl -f 'https://jules.googleapis.com/v1alpha/sessions' \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: ${{ secrets.JULES_API_KEY }}" \
            -d "$(jq -n \
              --arg prompt "$PROMPT" \
              --arg source "sources/github/${{ github.repository }}" \
              '{
                "prompt": $prompt,
                "sourceContext": {"source": $source, "githubRepoContext": {"startingBranch": "main"}},
                "automationMode": "AUTO_CREATE_PR",
                "title": "Brain Module Implementation"
              }')"
